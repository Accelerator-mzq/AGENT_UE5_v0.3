pack_id: "genre-boardgame"
version: "0.6.0"
title: "Boardgame Genre Skill Pack"
status: "phase6_playable_runtime"
description: "棋盘游戏类型包，支持从 GDD 自动编译完整 Spec Tree，并投影到 preview/runtime 两种路径。"
router:
  primary_router: "genre_boardgame_router"
  fallback_routers: []
activation:
  keywords:
    - "boardgame"
    - "棋盘游戏"
    - "board game"
    - "棋盘"
    - "回合制"
    - "井字棋"
  min_confidence: 0.7
required_skills:
  - "board_layout"
  - "piece_movement"
  - "turn_system"
optional_skills: []
review_extensions:
  - "boardgame_reviewer"
validation_extensions:
  - "boardgame_validator"
delta_policy:
  provider: "boardgame_delta_policy"
  enabled: true
policy:
  prefer_incremental: true
  allow_mixed_mode: false
  default_projection_profile: "preview_static"
dependencies:
  base_domains:
    - "product_scope"
    - "world_level"
    - "presentation_asset"
  static_base:
    - "WorldBuildStaticSpec"
    - "ValidationStaticSpec"
    - "BoardgameStaticSpec"
    - "BoardgameValidationStaticSpec"
  genre_contracts:
    - "TurnFlowPatchContract"
    - "DecisionUIPatchContract"
outputs:
  typical_specs:
    - "world_build_spec"
    - "boardgame_spec"
    - "board_layout_spec"
    - "piece_movement_spec"
    - "turn_flow_spec"
    - "decision_ui_spec"
    - "runtime_wiring_spec"
    - "validation_spec"
    - "scene_spec"
  typical_workflows:
    - "spawn_actor"
metadata:
  author: "AgentBridge Team"
  created_at: "2026-03-30"
  last_updated: "2026-04-01"
  note: "Phase 6 起 boardgame pack 作为真实编译驱动力接入 Compiler。"
